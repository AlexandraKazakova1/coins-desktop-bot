<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CoinsBot</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>CoinsBot</h1>

      <div class="card">
        <button id="btnAuth">Авторизація</button>

        <p class="hint">
          1) Натисни «Авторизація» та увійди в акаунт на сайті.<br />
          2) Встав одне або кілька посилань (кожне з нового рядка).<br />
          3) Вкажи кількість вкладок і натисни «Почати відстеження».
        </p>

        <label class="label">Посилання на товари (кожне з нового рядка)</label>
        <textarea
          id="urls"
          rows="4"
          placeholder="https://coins.bank.gov.ua/product-1
https://coins.bank.gov.ua/product-2"
        ></textarea>

        <label class="label">Кількість паралельних вкладок (1–10)</label>
        <input id="tabs" type="number" min="1" max="10" value="10" />

        <label class="label">Дата і час старту</label>
        <input id="startAt" type="datetime-local" />

        <div class="row">
          <button id="btnArm">Почати відстеження</button>
          <button id="btnStop" class="danger">Зупинити</button>
        </div>

        <div class="status">
          <div class="dot" id="dot"></div>
          <div>
            <div class="statusTitle" id="statusTitle">Готово</div>
            <div class="statusDetail" id="statusDetail"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="./ui.js"></script>
  </body>
</html>
