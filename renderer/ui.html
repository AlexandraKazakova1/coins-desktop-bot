<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CoinsBot</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>CoinsBot</h1>

      <div class="card">
        <button id="btnAuth">1) Авторизація</button>
        <button id="btnAddTab" class="secondary" disabled>
          2) Додати вкладку на цей акаунт
        </button>
        <button id="btnStartAll" class="secondary" disabled>
          3) Запустити пошук у всіх вкладках
        </button>

        <label class="label">Дата і час старту (спільно для всіх, необовʼязково)</label>
        <input id="startAt" type="datetime-local" />

        <div class="tabsHeader">
          <div class="label">Вкладки цього акаунта</div>
          <button id="btnStopAll" class="danger">Зупинити все</button>
        </div>
        <div class="hint">У кожній вкладці знизу буде поле для посилання на товар.</div>
        <div id="tabsList" class="tabsList"></div>

        <div class="status">
          <div class="dot" id="dot"></div>
          <div>
            <div class="statusTitle" id="statusTitle">Готово</div>
            <div class="statusDetail" id="statusDetail"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="./ui.js"></script>
  </body>
</html>
