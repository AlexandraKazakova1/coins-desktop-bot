<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CoinsBot</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>CoinsBot</h1>
      <div class="status">
        <div class="dot" id="dot"></div>
        <div>
          <div class="statusTitle" id="statusTitle">Готово</div>
          <div class="statusDetail" id="statusDetail"></div>
        </div>
      </div>

      <div class="card">
        <div class="label">1) Обери браузер та відкрий 2-3 вкладки на coins.bank.gov.ua</div>
        <div class="browserGrid">
          <button id="btnChrome" class="browserLaunch">
            <strong>Chrome</strong>
            <span id="chromeCount">0/3 вкладок</span>
          </button>
          <button id="btnOpera" class="browserLaunch">
            <strong>Opera</strong>
            <span id="operaCount">0/3 вкладок</span>
          </button>
          <button id="btnEdge" class="browserLaunch">
            <strong>Edge</strong>
            <span id="edgeCount">0/3 вкладок</span>
          </button>
        </div>

        <label class="label">2) Дата і час старту (для всіх вкладок, необовʼязково)</label>
        <input id="startAt" type="datetime-local" />

        <div class="tabsHeader">
          <div class="label">3) Встав посилання на монети та натисни «Очікування кнопки купити»</div>
          <div>
            <button id="btnStartAll" class="secondary">Очікування кнопки купити</button>
            <button id="btnStopAll" class="danger">Зупинити все</button>
          </div>
        </div>
        <div id="tabsList" class="tabsList"></div>
      </div>
    </div>

    <script src="./ui.js"></script>
  </body>
</html>
